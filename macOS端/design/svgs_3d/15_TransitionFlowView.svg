<svg xmlns="http://www.w3.org/2000/svg" width="280" height="400" viewBox="0 0 280 400">
<defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0a0a1a"/>
        <stop offset="50%" stop-color="#111138"/>
        <stop offset="100%" stop-color="#141430"/>
    </linearGradient>
    <!-- Glass surface gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <!-- Accent green gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10b981"/>
        <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <!-- Accent blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Accent amber gradient -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f59e0b"/>
        <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Accent rose gradient -->
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ec4899"/>
        <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <!-- Deep shadow -->
    <filter id="shadowDeep" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Medium shadow -->
    <filter id="shadowMed" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Button shadow -->
    <filter id="shadowBtn" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Glass reflection -->
    <linearGradient id="glassReflect" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
        <stop offset="40%" stop-color="rgba(255,255,255,0.0)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
</defs>
<rect width="280" height="400" fill="url(#bgGrad)" rx="0"/>
    <rect x="12" y="12" width="256" height="376" rx="20" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" filter="url(#shadowDeep)"/>
    <rect x="12" y="12" width="256" height="376" rx="20" fill="url(#glassReflect)" />
    <text x="28" y="38" font-family="Inter,Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">💕 建立情侣关系</text>
    <text x="140.0" y="100" font-family="Inter,Noto Sans SC,sans-serif" font-size="40" font-weight="400" fill="#f1f5f9" text-anchor="middle">💕</text>
    <text x="140.0" y="136" font-family="Inter,Noto Sans SC,sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">与你的伴侣一起养成宠物</text>
    <rect x="24" y="160" width="232" height="44" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" filter="url(#shadowMed)"/>
    <text x="40" y="182" font-family="Inter,Noto Sans SC,sans-serif" font-size="12" fill="#f1f5f9">伴侣 ID</text>
    <text x="240" y="182" font-family="Inter,Noto Sans SC,sans-serif" font-size="12" fill="#64748b" text-anchor="end">输入 ID...</text>
    <rect x="24" y="214" width="232" height="44" rx="12" fill="url(#cardGrad)" stroke="rgba(255,255,255,0.06)" stroke-width="0.5" filter="url(#shadowMed)"/>
    <text x="40" y="236" font-family="Inter,Noto Sans SC,sans-serif" font-size="12" fill="#f1f5f9">共享树木</text>
    <text x="240" y="236" font-family="Inter,Noto Sans SC,sans-serif" font-size="12" fill="#10b981" text-anchor="end">是</text>
    <rect x="48" y="292" width="160" height="44" rx="12" fill="#ec4899" opacity="0.15" filter="url(#shadowBtn)"/>
    <rect x="48" y="290" width="160" height="43" rx="12" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="48" y="290" width="160" height="22.0" rx="12" fill="rgba(255,255,255,0.08)"/>
    <text x="128.0" y="316.0" font-family="Inter,Noto Sans SC,sans-serif" font-size="15.84" font-weight="600" fill="#ec4899" text-anchor="middle">💕 建立关系</text>

</svg>