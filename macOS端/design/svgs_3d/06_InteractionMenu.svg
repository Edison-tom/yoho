<svg xmlns="http://www.w3.org/2000/svg" width="280" height="400" viewBox="0 0 280 400">
<defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0a0a1a"/>
        <stop offset="50%" stop-color="#111138"/>
        <stop offset="100%" stop-color="#141430"/>
    </linearGradient>
    <!-- Glass surface gradient -->
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.03)"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
    <!-- Accent green gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#10b981"/>
        <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <!-- Accent blue gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#3b82f6"/>
        <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <!-- Accent amber gradient -->
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#f59e0b"/>
        <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <!-- Accent rose gradient -->
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ec4899"/>
        <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <!-- Deep shadow -->
    <filter id="shadowDeep" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Medium shadow -->
    <filter id="shadowMed" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <!-- Button shadow -->
    <filter id="shadowBtn" x="-20%" y="-20%" width="140%" height="140%">
        <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.25"/>
    </filter>
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Glass reflection -->
    <linearGradient id="glassReflect" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
        <stop offset="40%" stop-color="rgba(255,255,255,0.0)"/>
        <stop offset="100%" stop-color="rgba(255,255,255,0.02)"/>
    </linearGradient>
</defs>
<rect width="280" height="400" fill="url(#bgGrad)" rx="0"/>
    <rect x="12" y="12" width="256" height="376" rx="20" fill="url(#glassGrad)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5" filter="url(#shadowDeep)"/>
    <rect x="12" y="12" width="256" height="376" rx="20" fill="url(#glassReflect)" />
    <text x="28" y="38" font-family="Inter,Noto Sans SC,sans-serif" font-size="15" font-weight="700" fill="#f1f5f9">🎯 互动</text>
    <rect x="28" y="66" width="200" height="48" rx="12" fill="#10b981" opacity="0.15" filter="url(#shadowBtn)"/>
    <rect x="28" y="64" width="200" height="47" rx="12" fill="#10b981" opacity="0.25" stroke="#10b981" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="28" y="64" width="200" height="24.0" rx="12" fill="rgba(255,255,255,0.08)"/>
    <text x="128.0" y="92.0" font-family="Inter,Noto Sans SC,sans-serif" font-size="17.28" font-weight="600" fill="#10b981" text-anchor="middle">🍪 喂食</text>
    <rect x="28" y="126" width="200" height="48" rx="12" fill="#3b82f6" opacity="0.15" filter="url(#shadowBtn)"/>
    <rect x="28" y="124" width="200" height="47" rx="12" fill="#3b82f6" opacity="0.25" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="28" y="124" width="200" height="24.0" rx="12" fill="rgba(255,255,255,0.08)"/>
    <text x="128.0" y="152.0" font-family="Inter,Noto Sans SC,sans-serif" font-size="17.28" font-weight="600" fill="#3b82f6" text-anchor="middle">🎾 玩耍</text>
    <rect x="28" y="186" width="200" height="48" rx="12" fill="#f59e0b" opacity="0.15" filter="url(#shadowBtn)"/>
    <rect x="28" y="184" width="200" height="47" rx="12" fill="#f59e0b" opacity="0.25" stroke="#f59e0b" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="28" y="184" width="200" height="24.0" rx="12" fill="rgba(255,255,255,0.08)"/>
    <text x="128.0" y="212.0" font-family="Inter,Noto Sans SC,sans-serif" font-size="17.28" font-weight="600" fill="#f59e0b" text-anchor="middle">🤚 抚摸</text>
    <rect x="28" y="246" width="200" height="48" rx="12" fill="#8b5cf6" opacity="0.15" filter="url(#shadowBtn)"/>
    <rect x="28" y="244" width="200" height="47" rx="12" fill="#8b5cf6" opacity="0.25" stroke="#8b5cf6" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="28" y="244" width="200" height="24.0" rx="12" fill="rgba(255,255,255,0.08)"/>
    <text x="128.0" y="272.0" font-family="Inter,Noto Sans SC,sans-serif" font-size="17.28" font-weight="600" fill="#8b5cf6" text-anchor="middle">🎓 训练</text>
    <rect x="28" y="306" width="200" height="48" rx="12" fill="#ec4899" opacity="0.15" filter="url(#shadowBtn)"/>
    <rect x="28" y="304" width="200" height="47" rx="12" fill="#ec4899" opacity="0.25" stroke="#ec4899" stroke-width="0.5" stroke-opacity="0.3"/>
    <rect x="28" y="304" width="200" height="24.0" rx="12" fill="rgba(255,255,255,0.08)"/>
    <text x="128.0" y="332.0" font-family="Inter,Noto Sans SC,sans-serif" font-size="17.28" font-weight="600" fill="#ec4899" text-anchor="middle">👗 装扮</text>

</svg>