<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a14; color:#f1f5f9; font-family:Inter,system-ui,sans-serif; padding:24px; }
h1 { text-align:center; margin-bottom:24px; font-size:24px; color:#10b981; }
.grid { display:flex; flex-wrap:wrap; gap:20px; justify-content:center; }
.card { 
    background:rgba(255,255,255,0.03); border-radius:16px; padding:16px;
    border:1px solid rgba(255,255,255,0.06);
}
.card svg { display:block; }
.label { text-align:center; font-size:12px; color:#94a3b8; margin-bottom:8px; font-weight:600; }
